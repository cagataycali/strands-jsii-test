<svg width="290" height="463" viewBox="0 0 290 463" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for code brackets -->
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="40%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    <!-- Python blue -->
    <linearGradient id="python" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4B8BBE"/>
      <stop offset="100%" stop-color="#306998"/>
    </linearGradient>
    <!-- TypeScript blue -->
    <linearGradient id="typescript" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3178C6"/>
      <stop offset="100%" stop-color="#235A97"/>
    </linearGradient>
    <!-- Java orange -->
    <linearGradient id="java" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F89820"/>
      <stop offset="100%" stop-color="#E76F00"/>
    </linearGradient>
    <!-- Go cyan -->
    <linearGradient id="golang" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ADD8"/>
      <stop offset="100%" stop-color="#007D9C"/>
    </linearGradient>
    <!-- C# purple -->
    <linearGradient id="csharp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9B4DCA"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
    <!-- Bridge gradient (metallic silver) -->
    <linearGradient id="bridge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D0D0D0"/>
      <stop offset="50%" stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <!-- Node connector gradient -->
    <radialGradient id="node" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="50%" stop-color="#C0C0C0"/>
      <stop offset="100%" stop-color="#808080"/>
    </radialGradient>
    <!-- Green glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="bracketglow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Shadow for depth -->
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ====== GREEN STRAND (intelligence ribbon — the Strands identity) ====== -->
  <path d="M259.147 0.981812C271.389 -2.57498 284.197 4.46571 287.754 16.7074C291.311 28.9492 284.27 41.757 272.028 45.3138L71.1727 103.671C40.7142 112.521 37.1976 154.262 65.7459 168.083L241.343 253.093C307.872 285.302 299.794 382.546 228.862 403.336L30.4041 461.502C18.1707 465.088 5.34708 458.078 1.76153 445.844C-1.8239 433.611 5.18637 420.787 17.4197 417.202L215.878 359.035C246.277 350.125 249.739 308.449 221.226 294.645L45.6297 209.635C-20.9834 177.386 -12.7772 79.9893 58.2928 59.3402L259.147 0.981812Z" fill="#00FF77"/>

  <!-- ====== CROSS-LANGUAGE BRIDGE (replaces robot arm — same trajectory) ====== -->
  <!-- The bridge follows the same S-curve as the robot arm, with language nodes -->

  <!-- === BRIDGE SPINE (the jsii backbone connecting all languages) === -->
  <!-- Main bridge path following arm trajectory -->
  <line x1="97.3" y1="52.8" x2="108" y2="103.8" stroke="url(#bridge)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <line x1="108" y1="103.8" x2="201.5" y2="130.2" stroke="url(#bridge)" stroke-width="9.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="201.5" y1="130.2" x2="205.9" y2="176.3" stroke="url(#bridge)" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <line x1="205.9" y1="176.3" x2="118.4" y2="218.7" stroke="url(#bridge)" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <line x1="118.4" y1="218.7" x2="31" y2="261.1" stroke="url(#bridge)" stroke-width="8.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="31" y1="261.1" x2="9.8" y2="344.5" stroke="url(#bridge)" stroke-width="8.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="9.8" y1="344.5" x2="96.3" y2="383.7" stroke="url(#bridge)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="96.3" y1="383.7" x2="189.6" y2="411" stroke="url(#bridge)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- === LANGUAGE NODES (at joint positions — each a language) === -->

  <!-- Node 0: TypeScript (origin — the source language) -->
  <circle cx="97.3" cy="52.8" r="16" fill="url(#node)" stroke="#888" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="97.3" cy="52.8" r="12" fill="url(#typescript)"/>
  <text x="97.3" y="57.3" text-anchor="middle" fill="white" font-family="monospace" font-weight="bold" font-size="13">TS</text>

  <!-- Node 1: Python -->
  <circle cx="108" cy="103.8" r="15" fill="url(#node)" stroke="#888" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="108" cy="103.8" r="11.5" fill="url(#python)"/>
  <text x="108" y="108.3" text-anchor="middle" fill="white" font-family="monospace" font-weight="bold" font-size="12">PY</text>

  <!-- Node 2: Java -->
  <circle cx="201.5" cy="130.2" r="14.5" fill="url(#node)" stroke="#888" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="201.5" cy="130.2" r="11" fill="url(#java)"/>
  <text x="201.5" y="134.5" text-anchor="middle" fill="white" font-family="monospace" font-weight="bold" font-size="11">JV</text>

  <!-- Node 3: Go -->
  <circle cx="205.9" cy="176.3" r="14" fill="url(#node)" stroke="#888" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="205.9" cy="176.3" r="10.5" fill="url(#golang)"/>
  <text x="205.9" y="180.8" text-anchor="middle" fill="white" font-family="monospace" font-weight="bold" font-size="11">GO</text>

  <!-- Node 4: C# -->
  <circle cx="118.4" cy="218.7" r="14" fill="url(#node)" stroke="#888" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="118.4" cy="218.7" r="10.5" fill="url(#csharp)"/>
  <text x="118.4" y="223.2" text-anchor="middle" fill="white" font-family="monospace" font-weight="bold" font-size="11">C#</text>

  <!-- === CODE BRACKETS floating near nodes (the "language" visual) === -->

  <!-- Left bracket { near Python -->
  <text x="80" y="108" fill="#4B8BBE" font-family="monospace" font-size="22" font-weight="bold" opacity="0.6" filter="url(#bracketglow)">{</text>

  <!-- Right bracket } near Java -->
  <text x="222" y="135" fill="#E76F00" font-family="monospace" font-size="22" font-weight="bold" opacity="0.6" filter="url(#bracketglow)">}</text>

  <!-- Angle bracket < near Go -->
  <text x="225" y="181" fill="#00ADD8" font-family="monospace" font-size="20" font-weight="bold" opacity="0.5" filter="url(#bracketglow)">&lt;/&gt;</text>

  <!-- Bracket [ near C# -->
  <text x="90" y="238" fill="#9B4DCA" font-family="monospace" font-size="18" font-weight="bold" opacity="0.5" filter="url(#bracketglow)">[ ]</text>

  <!-- def near TypeScript -->
  <text x="117" y="50" fill="#3178C6" font-family="monospace" font-size="14" font-weight="bold" opacity="0.5" filter="url(#bracketglow)">( )</text>

  <!-- === JSII BRIDGE NODES (lower section — the universal adapter) === -->

  <!-- Node 5: Universal bridge symbol -->
  <circle cx="31" cy="261.1" r="13" fill="url(#node)" stroke="#888" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="31" cy="261.1" r="9.5" fill="#333"/>
  <!-- Bridge icon: interlocking arrows -->
  <path d="M24 261 L31 255 L38 261 L31 267 Z" fill="none" stroke="#00FF77" stroke-width="1.8" opacity="0.9"/>
  <circle cx="31" cy="261.1" r="3" fill="#00FF77" opacity="0.7"/>

  <!-- Node 6: Runtime -->
  <circle cx="9.8" cy="344.5" r="12.5" fill="url(#node)" stroke="#888" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="9.8" cy="344.5" r="9" fill="#333"/>
  <!-- Gear icon (runtime) -->
  <circle cx="9.8" cy="344.5" r="4" fill="none" stroke="#00FF77" stroke-width="1.5" opacity="0.8"/>
  <circle cx="9.8" cy="344.5" r="1.5" fill="#00FF77" opacity="0.7"/>

  <!-- Node 7: Compiler -->
  <circle cx="96.3" cy="383.7" r="12" fill="url(#node)" stroke="#888" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="96.3" cy="383.7" r="8.5" fill="#333"/>
  <!-- Arrow icon (compiler output) -->
  <path d="M90 383.7 L102 383.7 M98 379.7 L102 383.7 L98 387.7" fill="none" stroke="#00FF77" stroke-width="1.8" opacity="0.8"/>

  <!-- === OUTPUT FORKS (at the end — languages going to their targets) === -->

  <!-- Main output node -->
  <circle cx="189.6" cy="411" r="11" fill="url(#node)" stroke="#888" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="189.6" cy="411" r="8" fill="#333"/>
  <text x="189.6" y="415" text-anchor="middle" fill="#00FF77" font-family="monospace" font-weight="bold" font-size="10">⚡</text>

  <!-- Fork 1: .whl (Python package) -->
  <line x1="189.6" y1="411" x2="165" y2="440" stroke="#4B8BBE" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <circle cx="165" cy="440" r="8" fill="#306998" filter="url(#shadow)"/>
  <text x="165" y="443.5" text-anchor="middle" fill="white" font-family="monospace" font-size="7" font-weight="bold">.whl</text>

  <!-- Fork 2: .jar (Java package) -->
  <line x1="189.6" y1="411" x2="189.6" y2="445" stroke="#E76F00" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <circle cx="189.6" cy="445" r="8" fill="#E76F00" filter="url(#shadow)"/>
  <text x="189.6" y="448.5" text-anchor="middle" fill="white" font-family="monospace" font-size="7" font-weight="bold">.jar</text>

  <!-- Fork 3: .nupkg (C# package) -->
  <line x1="189.6" y1="411" x2="214" y2="440" stroke="#9B4DCA" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <circle cx="214" cy="440" r="8" fill="#6A1B9A" filter="url(#shadow)"/>
  <text x="214" y="443.5" text-anchor="middle" fill="white" font-family="monospace" font-size="6" font-weight="bold">.nupkg</text>

  <!-- === GREEN ENERGY flowing through bridge (intelligence crossing language barriers) === -->
  <!-- Glow at crossing points where green strand meets the bridge -->
  <circle cx="108" cy="103.8" r="8" fill="#00FF77" opacity="0.1" filter="url(#softglow)"/>
  <circle cx="118.4" cy="218.7" r="8" fill="#00FF77" opacity="0.1" filter="url(#softglow)"/>
  <circle cx="9.8" cy="344.5" r="8" fill="#00FF77" opacity="0.1" filter="url(#softglow)"/>

  <!-- Green energy dots at key bridge nodes -->
  <circle cx="108" cy="103.8" r="2.5" fill="#00FF77" opacity="0.4" filter="url(#glow)"/>
  <circle cx="118.4" cy="218.7" r="2.5" fill="#00FF77" opacity="0.4" filter="url(#glow)"/>
  <circle cx="9.8" cy="344.5" r="2.5" fill="#00FF77" opacity="0.4" filter="url(#glow)"/>
  <circle cx="31" cy="261.1" r="2" fill="#00FF77" opacity="0.3" filter="url(#glow)"/>
  <circle cx="96.3" cy="383.7" r="2" fill="#00FF77" opacity="0.3" filter="url(#glow)"/>

  <!-- === DATA PARTICLES (small dots flowing along the bridge — bits traveling) === -->
  <circle cx="102" cy="78" r="1.5" fill="#00FF77" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="117" r="1.5" fill="#00FF77" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="204" cy="153" r="1.3" fill="#00FF77" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="162" cy="197" r="1.3" fill="#00FF77" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="74" cy="240" r="1.2" fill="#00FF77" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="303" r="1.2" fill="#00FF77" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="53" cy="364" r="1.1" fill="#00FF77" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="143" cy="397" r="1.1" fill="#00FF77" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>