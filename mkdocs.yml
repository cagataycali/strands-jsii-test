site_name: Strands Agents — Cross-Language SDK
site_url: https://cagataycali.github.io/strands-jsii
site_description: "Write agents once. Run them in Python, TypeScript, Java, Go, and C#. One TypeScript source, native idioms in every language."
extra_css:
- stylesheets/extra.css?v=3
extra_javascript:
- https://unpkg.com/mermaid@10/dist/mermaid.min.js
nav:
- Home: index.md
- Getting Started:
  - Installation: getting-started/installation.md
  - Your First Agent: getting-started/first-agent.md
  - How It Works: getting-started/how-it-works.md
- Tutorials:
  - Build a CLI Assistant: tutorials/cli-assistant.md
  - Build a Research Pipeline: tutorials/research-pipeline.md
  - Wrap Any Library as a Tool: tutorials/wrap-any-library.md
  - Add a Custom Model Provider: tutorials/custom-provider.md
- Tools:
  - Creating Tools: tools/creating-tools.md
  - Direct Tool Calls: tools/direct-tool-calls.md
  - Hot Reload: tools/hot-reload.md
  - The use_X Pattern: tools/use-x-pattern.md
- Model Providers:
  - Overview: providers/overview.md
  - Amazon Bedrock: providers/bedrock.md
  - Anthropic: providers/anthropic.md
  - OpenAI: providers/openai.md
  - Google Gemini: providers/gemini.md
  - Ollama: providers/ollama.md
- Multi-Agent:
  - Agent as Tool: multi-agent/agent-as-tool.md
  - Patterns: multi-agent/patterns.md
- Advanced:
  - Conversation Management: advanced/conversation-management.md
  - Callbacks & Hooks: advanced/callbacks-and-hooks.md
  - Error Handling: advanced/error-handling.md
  - Building from Source: advanced/building-from-source.md
- Benchmarks: benchmarks.md
- API Reference: api-reference/index.md
- FAQ: faq.md
theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
  - navigation.sections
  - navigation.expand
  - navigation.indexes
  - toc.follow
  - content.code.copy
  - content.tabs.link
  - navigation.top
  - navigation.tracking
  - navigation.footer
markdown_extensions:
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format ''
- pymdownx.tabbed:
    alternate_style: true
- admonition
- pymdownx.details
- pymdownx.betterem
- pymdownx.mark
- pymdownx.caret
- pymdownx.tilde
- pymdownx.keys
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji ''
    emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
- attr_list
- md_in_html
- tables
- toc:
    permalink: true
