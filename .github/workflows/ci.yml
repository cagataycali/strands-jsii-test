name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --no-coverage

      - name: Build with jsii
        run: npm run build

      - name: Package Python
        run: npm run package:python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test Python package
        run: |
          pip install dist/python/*.whl
          python -c "
          from strands_jsii import (
              StrandsAgent, AgentConfig, BedrockModelConfig,
              ContentBlock, ErrorClassifier, RetryStrategy,
              SummarizingConversationManager, MessageRole,
          )
          # Smoke test
          block = ContentBlock.from_text('hello')
          assert block.is_text
          err = ErrorClassifier.classify('{\"error\": \"ThrottlingException\"}')
          assert type(err).__name__ == 'ModelThrottledError'
          print('✅ Python smoke test passed')
          "

  package-all:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java (for Maven/jsii-pacmak)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'

      - name: Setup .NET SDK (for dotnet/jsii-pacmak)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Go (for go/jsii-pacmak)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Python (for python/jsii-pacmak)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: npm ci
      - run: npm run build
      - run: npm run package:all

      - name: List generated packages
        run: |
          echo "=== Generated Packages ==="
          find dist -type f | head -50
          echo ""
          echo "=== Package sizes ==="
          du -sh dist/*/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/
          retention-days: 30
