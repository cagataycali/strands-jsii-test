name: E2E Tests — All Languages
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  # Shared model config — use a small/fast model for CI
  BEDROCK_MODEL_ID: us.anthropic.claude-sonnet-4-20250514-v1:0
  BEDROCK_REGION: us-west-2
  BEDROCK_MAX_TOKENS: 256

jobs:
  # ─────────────────────────────────────────────────────────
  # Build jsii + package all targets
  # ─────────────────────────────────────────────────────────
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # Package all targets
      - run: npx jsii-pacmak --targets python
      - run: npx jsii-pacmak --targets java
      - run: npx jsii-pacmak --targets go

      # Apply language sugar patches
      - name: Patch Python
        run: python3 scripts/patch-python.py dist/python

      - name: Patch Java/C#
        run: python3 scripts/patch-java-csharp.py

      # Upload all artifacts for downstream jobs
      - uses: actions/upload-artifact@v4
        with:
          name: jsii-dist
          path: |
            dist/
            lib/
            .jsii
            package.json
            node_modules/
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # TypeScript/JavaScript E2E
  # ─────────────────────────────────────────────────────────
  e2e-typescript:
    name: E2E — TypeScript
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          name: jsii-dist

      - run: npm ci

      - name: E2E — Agent with tool (Bedrock)
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
        run: |
          node -e "
          const { StrandsAgent, AgentConfig, BedrockModelProvider, BedrockModelConfig,
                  FunctionTool, ToolHandler, ToolBuilder, Strands } = require('./lib');

          // ── Test 1: Strands factory creates agent ──
          console.log('Test 1: Strands.agent() factory...');
          const agent1 = Strands.agent();
          console.log('✅ Strands.agent() works');

          // ── Test 2: .ask() exists ──
          console.log('Test 2: .ask() method...');
          if (typeof agent1.ask !== 'function') throw new Error('.ask() missing');
          console.log('✅ .ask() exists on agent');

          // ── Test 3: .toolCall() exists ──
          console.log('Test 3: .toolCall() method...');
          if (typeof agent1.toolCall !== 'function') throw new Error('.toolCall() missing');
          console.log('✅ .toolCall() exists on agent');

          // ── Test 4: ToolBuilder fluent API ──
          console.log('Test 4: ToolBuilder.param().withHandler().create()...');
          class CalcHandler extends ToolHandler {
            handle(inputJson) {
              const { expression } = JSON.parse(inputJson);
              return JSON.stringify({ result: eval(expression) });
            }
          }
          const calc = Strands.tool('calculator', 'Evaluate math')
            .param('expression', 'string', 'Math expression')
            .withHandler(new CalcHandler())
            .create();
          console.log('✅ ToolBuilder fluent chain works: ' + calc.spec.name);

          // ── Test 5: Tool execution ──
          console.log('Test 5: Direct tool execution...');
          const result = calc.execute(JSON.stringify({ expression: '6 * 7' }));
          const parsed = JSON.parse(result);
          if (parsed.result !== 42) throw new Error('Expected 42, got ' + parsed.result);
          console.log('✅ Tool returns correct result: ' + parsed.result);

          console.log('');
          console.log('🎉 All TypeScript smoke tests passed!');
          "

      - name: E2E — Live Bedrock call
        if: env.AWS_BEARER_TOKEN_BEDROCK != ''
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
        run: |
          node -e "
          const { StrandsAgent, AgentConfig, BedrockModelProvider, BedrockModelConfig,
                  FunctionTool, ToolHandler, Strands } = require('./lib');

          class CalcHandler extends ToolHandler {
            handle(inputJson) {
              const { expression } = JSON.parse(inputJson);
              try { return JSON.stringify({ result: eval(expression) }); }
              catch (e) { return JSON.stringify({ error: e.message }); }
            }
          }

          const calc = Strands.tool('calculator', 'Evaluate a math expression')
            .param('expression', 'string', 'The math expression to evaluate', true)
            .withHandler(new CalcHandler())
            .create();

          const agent = Strands.agentWith(
            Strands.bedrock('${BEDROCK_MODEL_ID}', '${BEDROCK_REGION}'),
            calc
          );

          console.log('Calling Bedrock with tool...');
          const response = agent.ask('What is 42 * 17? Use the calculator tool.');
          console.log('Response:', response.text.substring(0, 200));
          console.log('Tokens:', response.totalTokens);

          if (!response.text || response.text.length === 0) {
            throw new Error('Empty response from Bedrock');
          }
          if (response.text.includes('714')) {
            console.log('✅ Correct answer found in response!');
          }
          console.log('🎉 TypeScript E2E with Bedrock passed!');
          "

  # ─────────────────────────────────────────────────────────
  # Python E2E
  # ─────────────────────────────────────────────────────────
  e2e-python:
    name: E2E — Python
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          name: jsii-dist

      - name: Install Python package
        run: pip install dist/python/*.whl

      - name: E2E — Smoke tests (no Bedrock needed)
        run: |
          python3 -c "
          from strands_jsii import (
              Agent, Bedrock, tool, Strands, StrandsAgent, ToolBuilder,
              FunctionTool, ToolHandler, AgentConfig,
              ContentBlock, AgentMessage, MessageRole,
              ErrorClassifier, RetryStrategy,
              SlidingWindowConversationManager,
          )

          # ── Test 1: Strands factory ──
          print('Test 1: Strands factory methods...')
          assert hasattr(Strands, 'agent')
          assert hasattr(Strands, 'agent_with')
          assert hasattr(Strands, 'bedrock')
          assert hasattr(Strands, 'anthropic')
          assert hasattr(Strands, 'openai')
          assert hasattr(Strands, 'gemini')
          assert hasattr(Strands, 'tool')
          assert hasattr(Strands, 'tool_direct')
          print('✅ All Strands factory methods exist')

          # ── Test 2: .ask() and .tool_call() on StrandsAgent ──
          print('Test 2: .ask() and .tool_call() on StrandsAgent...')
          assert hasattr(StrandsAgent, 'ask')
          assert hasattr(StrandsAgent, 'tool_call')
          print('✅ .ask() and .tool_call() exist')

          # ── Test 3: @tool decorator ──
          print('Test 3: @tool decorator...')
          @tool
          def calculator(expression: str) -> str:
              '''Evaluate a math expression.'''
              return str(eval(expression))
          assert calculator.spec.name == 'calculator'
          result = calculator.execute('{\"expression\": \"6 * 7\"}')
          import json
          assert json.loads(result)['result'] == '42'
          print('✅ @tool decorator works, result: 42')

          # ── Test 4: ToolBuilder fluent API ──
          print('Test 4: ToolBuilder fluent API...')
          # Use Strands.tool() which handles handler creation properly
          assert hasattr(ToolBuilder, 'param')
          assert hasattr(ToolBuilder, 'with_handler')
          assert hasattr(ToolBuilder, 'create')
          print('✅ ToolBuilder has param/with_handler/create')

          # ── Test 5: Agent creation with Pythonic sugar ──
          print('Test 5: Agent(**kwargs) Pythonic creation...')
          agent = Agent(tools=[calculator])
          assert agent.tool_count == 1
          print('✅ Agent(tools=[...]) works, tool_count:', agent.tool_count)

          # ── Test 6: agent.tool.X() proxy ──
          print('Test 6: agent.tool.X() proxy...')
          result = agent.tool.calculator(expression='6 * 7')
          assert result['result'] == '42'
          print('✅ agent.tool.calculator() returned:', result)

          # ── Test 7: ContentBlock and types ──
          print('Test 7: ContentBlock types...')
          block = ContentBlock.from_text('hello')
          assert block.is_text
          assert block.as_text.text == 'hello'
          print('✅ ContentBlock works')

          # ── Test 8: ErrorClassifier ──
          print('Test 8: ErrorClassifier...')
          err = ErrorClassifier.classify('{\"error\": \"ThrottlingException\"}')
          assert type(err).__name__ == 'ModelThrottledError'
          print('✅ ErrorClassifier works')

          # ── Test 9: Callable agent ──
          print('Test 9: Agent is callable...')
          assert callable(agent)
          print('✅ agent() is callable')

          print()
          print('🎉 All Python smoke tests passed! (Python ${{ matrix.python-version }})')
          "

      - name: E2E — Live Bedrock call
        if: env.AWS_BEARER_TOKEN_BEDROCK != ''
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
        run: |
          python3 -c "
          from strands_jsii import Agent, Bedrock, tool, Strands

          @tool
          def calculator(expression: str) -> str:
              '''Evaluate a math expression.'''
              return str(eval(expression))

          agent = Agent(
              model=Bedrock(
                  model_id='${{ env.BEDROCK_MODEL_ID }}',
                  region='${{ env.BEDROCK_REGION }}',
                  max_tokens=${{ env.BEDROCK_MAX_TOKENS }},
              ),
              tools=[calculator],
          )

          print('Calling Bedrock with tool...')
          response = agent('What is 42 * 17? Use the calculator tool.')
          print('Response:', response.text[:200])
          print('Tokens:', response.total_tokens)

          assert response.text, 'Empty response from Bedrock'
          if '714' in response.text:
              print('✅ Correct answer found in response!')
          print('🎉 Python E2E with Bedrock passed!')
          "

  # ─────────────────────────────────────────────────────────
  # Java E2E
  # ─────────────────────────────────────────────────────────
  e2e-java:
    name: E2E — Java
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          name: jsii-dist

      - name: Setup Java project
        run: |
          # Create a minimal Maven project that depends on the jsii Java bindings
          mkdir -p e2e-java/src/main/java
          cat > e2e-java/pom.xml << 'POMEOF'
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>test</groupId>
            <artifactId>e2e-java</artifactId>
            <version>1.0</version>
            <properties>
              <maven.compiler.source>17</maven.compiler.source>
              <maven.compiler.target>17</maven.compiler.target>
            </properties>
            <dependencies>
              <dependency>
                <groupId>io.github.cagataycali</groupId>
                <artifactId>strands-agents-jsii</artifactId>
                <version>0.1.0</version>
                <scope>system</scope>
                <systemPath>${project.basedir}/../dist/java/strands-agents-jsii.jar</systemPath>
              </dependency>
              <dependency>
                <groupId>software.amazon.jsii</groupId>
                <artifactId>jsii-runtime</artifactId>
                <version>1.106.0</version>
              </dependency>
            </dependencies>
          </project>
          POMEOF

          # Install local jar if it exists
          if ls dist/java/*.jar 1>/dev/null 2>&1; then
            JAR=$(ls dist/java/*.jar | head -1)
            mvn install:install-file -Dfile="$JAR" \
              -DgroupId=io.github.cagataycali \
              -DartifactId=strands-agents-jsii \
              -Dversion=0.1.0 \
              -Dpackaging=jar -q 2>/dev/null || true
            echo "✅ Installed Java jar: $JAR"
          else
            echo "⚠️ No Java jar found in dist/java — skipping Maven tests"
          fi

      - name: E2E — Java compilation test
        run: |
          # Verify Java bindings can at minimum be inspected
          if ls dist/java/*.jar 1>/dev/null 2>&1; then
            JAR=$(ls dist/java/*.jar | head -1)
            echo "Testing jar: $JAR"
            jar tf "$JAR" | grep -i "Strands" | head -10
            echo "✅ Java jar contains Strands classes"
          else
            echo "⚠️ No Java jar — testing jsii-pacmak output structure"
            ls -la dist/java/ 2>/dev/null || echo "No java dist found"
          fi

  # ─────────────────────────────────────────────────────────
  # Go E2E
  # ─────────────────────────────────────────────────────────
  e2e-go:
    name: E2E — Go
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          name: jsii-dist

      - name: E2E — Go module structure test
        run: |
          if [ -d "dist/go" ]; then
            echo "Go distribution found:"
            find dist/go -name "*.go" | head -20
            echo ""

            # Check sugar.go exists
            if [ -f "dist/go/strandsagentsjsii/sugar.go" ]; then
              echo "✅ sugar.go exists with Go idioms"
              grep -c "func NewAgent\|func NewTool\|func BedrockDefault" dist/go/strandsagentsjsii/sugar.go
            fi

            # Check jsii-generated files exist
            GO_FILES=$(find dist/go -name "*.go" | wc -l)
            echo "✅ Found $GO_FILES Go files"

            # Verify it has go.mod
            if [ -f "dist/go/strandsagentsjsii/go.mod" ] || [ -f "dist/go/go.mod" ]; then
              echo "✅ go.mod found"
            fi
          else
            echo "⚠️ No Go dist found"
          fi

  # ─────────────────────────────────────────────────────────
  # Cross-language DX verification
  # ─────────────────────────────────────────────────────────
  e2e-dx-verification:
    name: E2E — DX API Surface
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/download-artifact@v4
        with:
          name: jsii-dist

      - run: npm ci
      - run: pip install dist/python/*.whl

      - name: Verify jsii assembly exports Strands class
        run: |
          # The .jsii file is in the repo root after jsii compile
          # But we get it from the build artifact — need to rebuild or check lib/
          node -e "
          const fs = require('fs');

          // .jsii might be in root or we can inspect the lib/ output
          let assembly;
          if (fs.existsSync('./.jsii')) {
            assembly = JSON.parse(fs.readFileSync('./.jsii', 'utf-8'));
          } else {
            // Fallback: check the actual exports from lib/
            const lib = require('./lib');
            const exportedNames = Object.keys(lib);
            console.log('Checking lib/ exports (no .jsii file)...');

            const required = [
              'StrandsAgent',
              'Strands',
              'ToolBuilder',
              'FunctionTool',
              'BedrockModelProvider',
              'AnthropicModelProvider',
              'OpenAIModelProvider',
              'GeminiModelProvider',
            ];

            for (const name of required) {
              if (!lib[name]) throw new Error('Missing from lib exports: ' + name);
              console.log('  ✅ ' + name);
            }

            // Verify StrandsAgent has .ask() and .toolCall()
            const proto = lib.StrandsAgent.prototype;
            if (typeof proto.ask !== 'function') throw new Error('.ask() missing from StrandsAgent');
            console.log('  ✅ StrandsAgent.prototype.ask()');
            if (typeof proto.toolCall !== 'function') throw new Error('.toolCall() missing from StrandsAgent');
            console.log('  ✅ StrandsAgent.prototype.toolCall()');

            console.log('');
            console.log('🎉 All required cross-language types found in lib/ exports!');
            process.exit(0);
          }

          const types = Object.keys(assembly.types);
          const required = [
            'StrandsAgent',
            'Strands',
            'ToolBuilder',
            'FunctionTool',
            'BedrockModelProvider',
            'AnthropicModelProvider',
            'OpenAIModelProvider',
            'GeminiModelProvider',
          ];

          console.log('Checking jsii assembly for required types...');
          for (const name of required) {
            const found = types.some(t => t.includes(name));
            if (!found) throw new Error('Missing from jsii assembly: ' + name);
            console.log('  ✅ ' + name);
          }

          console.log('');
          console.log('🎉 jsii assembly contains all required cross-language types!');
          "

      - name: Verify Python has all DX APIs
        run: |
          python3 -c "
          from strands_jsii import (
              # The 2-line test APIs
              Agent, Bedrock, tool, Strands,
              # Core types
              StrandsAgent, AgentConfig, ToolBuilder,
              FunctionTool, ToolHandler,
              # Model providers
              BedrockModelProvider, AnthropicModelProvider,
              OpenAIModelProvider, GeminiModelProvider,
              # Conversation
              SlidingWindowConversationManager,
              # Hooks
              CallbackHandler, HookRegistry,
              # Errors
              ModelThrottledError, MaxTokensReachedError,
              ContextWindowOverflowError, ToolExecutionError,
              # Safety
              GuardrailConfig,
          )

          # Verify the full API surface
          apis = {
              'Strands.agent': hasattr(Strands, 'agent'),
              'Strands.agent_with': hasattr(Strands, 'agent_with'),
              'Strands.bedrock': hasattr(Strands, 'bedrock'),
              'Strands.anthropic': hasattr(Strands, 'anthropic'),
              'Strands.openai': hasattr(Strands, 'openai'),
              'Strands.gemini': hasattr(Strands, 'gemini'),
              'Strands.tool': hasattr(Strands, 'tool'),
              'StrandsAgent.ask': hasattr(StrandsAgent, 'ask'),
              'StrandsAgent.tool_call': hasattr(StrandsAgent, 'tool_call'),
              'ToolBuilder.param': hasattr(ToolBuilder, 'param'),
              'ToolBuilder.with_handler': hasattr(ToolBuilder, 'with_handler'),
              'ToolBuilder.create': hasattr(ToolBuilder, 'create'),
              'Agent callable': callable(Agent),
              '@tool works': callable(tool),
          }

          all_pass = True
          for name, exists in apis.items():
              status = '✅' if exists else '❌'
              print(f'  {status} {name}')
              if not exists: all_pass = False

          assert all_pass, 'Some DX APIs are missing!'
          print()
          print('🎉 Full DX API surface verified for Python!')
          "

  # ─────────────────────────────────────────────────────────
  # Summary gate
  # ─────────────────────────────────────────────────────────
  e2e-summary:
    name: E2E Summary
    needs: [e2e-typescript, e2e-python, e2e-java, e2e-go, e2e-dx-verification]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║  E2E Test Results                        ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  TypeScript: ${{ needs.e2e-typescript.result }}"
          echo "║  Python:     ${{ needs.e2e-python.result }}"
          echo "║  Java:       ${{ needs.e2e-java.result }}"
          echo "║  Go:         ${{ needs.e2e-go.result }}"
          echo "║  DX Surface: ${{ needs.e2e-dx-verification.result }}"
          echo "╚══════════════════════════════════════════╝"

          if [ "${{ needs.e2e-typescript.result }}" = "failure" ] || \
             [ "${{ needs.e2e-python.result }}" = "failure" ] || \
             [ "${{ needs.e2e-dx-verification.result }}" = "failure" ]; then
            echo "❌ Critical E2E tests failed!"
            exit 1
          fi
          echo "✅ All critical E2E tests passed!"
